<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Care Team Dashboard</title>

<style>
body { font-family: Arial; background:#f3f4f6; margin:0; }
.container { max-width:1100px; margin:auto; padding:20px; }

.card {
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

.grid {
  display:grid;
  grid-template-columns: repeat(4,1fr);
  gap:12px;
}

.metric {
  padding:15px;
  border-radius:10px;
  background:#f9fafb;
}

.metric h3 { margin:0; font-size:12px; color:#6b7280; }
.metric p { margin:5px 0 0; font-size:22px; font-weight:bold; }

.red { background:#fee2e2; }
.yellow { background:#fef3c7; }
.green { background:#dcfce7; }
.blue { background:#e0f2fe; }

table {
  width:100%;
  border-collapse:collapse;
  margin-top:16px;
}

th, td {
  padding:10px;
  border-bottom:1px solid #e5e7eb;
  text-align:left;
}

.status {
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
  font-weight:700;
}

.status-green { background:#dcfce7; }
.status-yellow { background:#fef3c7; }
.status-red { background:#fee2e2; }

.tier {
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
  font-weight:700;
}

.t1 { background:#dcfce7; }
.t2 { background:#fef3c7; }
.t3 { background:#fee2e2; }

.priority-box {
  border:1px solid #e5e7eb;
  border-radius:12px;
  padding:14px;
  margin-top:12px;
  background:#f9fafb;
}

.small {
  font-size:13px;
  color:#6b7280;
  margin-top:6px;
}

button {
  padding:10px 14px;
  margin-right:8px;
}
</style>
</head>

<body>

<div class="container">

<h1>Care Team Dashboard</h1>

<!-- COORDINATOR SUMMARY -->
<div class="card">
<h2>Coordinator Summary</h2>
<div class="grid">

<div class="metric red">
<h3>Needs Action</h3>
<p id="needsAction">0</p>
</div>

<div class="metric yellow">
<h3>Escalated Today</h3>
<p id="escalated">0</p>
</div>

<div class="metric green">
<h3>Improving</h3>
<p id="improving">0</p>
</div>

<div class="metric blue">
<h3>Declining</h3>
<p id="declining">0</p>
</div>

</div>
</div>

<!-- PILOT METRICS -->
<div class="card">
<h2>Pilot Metrics</h2>

<div class="grid">

<div class="metric blue">
<h3>Check-Ins Today</h3>
<p id="checkins">0</p>
</div>

<div class="metric green">
<h3>Adherence</h3>
<p id="adherence">0%</p>
</div>

<div class="metric">
<h3>Average ERS</h3>
<p id="avg">0</p>
</div>

<div class="metric red">
<h3>High Risk</h3>
<p id="risk">0</p>
</div>

</div>
</div>

<!-- PRIORITY -->
<div class="card">
<h2>Priority Queue</h2>
<div id="priorityQueue"></div>
</div>

<!-- TABLE -->
<div class="card">
<h2>Patients</h2>

<table>
<thead>
<tr>
<th>Name</th>
<th>Status</th>
<th>ERS</th>
<th>Trend</th>
<th>Tier</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

</div>

<script>

let patients = JSON.parse(localStorage.getItem("cp_demo_patients") || "[]");
let history = JSON.parse(localStorage.getItem("cp_score_history") || "[]");

// CLICK PATIENT
function openPatient(p){
  localStorage.setItem("selected_patient", JSON.stringify(p));
  window.location.href = "patient-detail.html";
}

// SORT
function sortPatients(){
  const order = {"Tier 3":0,"Tier 2":1,"Tier 1":2};
  patients.sort((a,b)=>order[a.tier]-order[b.tier]);
}

// PRIORITY
function renderPriority(){
  sortPatients();
  let html="";

  patients.forEach((p,i)=>{
    html += `
    <div class="priority-box">
      <strong>${i+1}. ${p.name}</strong><br>
      <span class="status status-${p.status}">${p.status}</span>
      <span class="tier ${p.tier === "Tier 3" ? "t3" : p.tier === "Tier 2" ? "t2" : "t1"}">${p.tier}</span>
      <div class="small">ERS ${p.score} • ${p.trend}</div>
    </div>`;
  });

  document.getElementById("priorityQueue").innerHTML = html;
}

// TABLE
function renderTable(){
  sortPatients();
  let html="";

  patients.forEach(p=>{
    html += `
    <tr onclick='openPatient(${JSON.stringify(p)})' style="cursor:pointer;">
      <td>${p.name}</td>
      <td><span class="status status-${p.status}">${p.status}</span></td>
      <td>${p.score}</td>
      <td>${p.trend}</td>
      <td><span class="tier ${p.tier === "Tier 3" ? "t3" : p.tier === "Tier 2" ? "t2" : "t1"}">${p.tier}</span></td>
    </tr>`;
  });

  document.getElementById("table").innerHTML = html;
}

// METRICS
function renderMetrics(){

let needsAction = patients.filter(p=>p.tier!=="Tier 1").length;
let improving = patients.filter(p=>p.trend.includes("↑")).length;
let declining = patients.filter(p=>p.trend.includes("↓")).length;
let highRisk = patients.filter(p=>p.tier==="Tier 3").length;

let avg = patients.length
? Math.round(patients.reduce((s,p)=>s+p.score,0)/patients.length)
:0;

let adherence = patients.length
? Math.round((patients.filter(p=>p.score>=80).length / patients.length)*100)
:0;

let today = new Date();
let checkinsToday = history.filter(h=>{
let d=new Date(h.time);
return d.toDateString() === today.toDateString();
}).length;

document.getElementById("needsAction").innerText = needsAction;
document.getElementById("improving").innerText = improving;
document.getElementById("declining").innerText = declining;
document.getElementById("risk").innerText = highRisk;
document.getElementById("avg").innerText = avg;
document.getElementById("adherence").innerText = adherence+"%";
document.getElementById("checkins").innerText = checkinsToday;
document.getElementById("escalated").innerText = highRisk;

}

// INIT
renderPriority();
renderTable();
renderMetrics();

</script>

</body>
</html>

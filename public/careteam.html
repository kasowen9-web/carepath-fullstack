<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarePath Command Center</title>

<style>
body { font-family: Arial; background:#f3f4f6; margin:0; }
.container { max-width:1150px; margin:auto; padding:20px; }

.card {
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

.grid {
  display:grid;
  grid-template-columns: repeat(4,1fr);
  gap:12px;
}

.metric {
  padding:15px;
  border-radius:10px;
  background:#f9fafb;
}

.metric h3 { margin:0; font-size:12px; color:#6b7280; }
.metric p { margin:5px 0 0; font-size:22px; font-weight:bold; }

.red { background:#fee2e2; }
.yellow { background:#fef3c7; }
.green { background:#dcfce7; }
.blue { background:#e0f2fe; }

.alert-banner {
  padding:14px;
  border-radius:10px;
  font-weight:700;
  margin-bottom:16px;
}

.alert-red { background:#991b1b; color:white; }
.alert-yellow { background:#92400e; color:white; }
.alert-green { background:#166534; color:white; }

.command-strip {
  display:grid;
  grid-template-columns: 2fr 1fr;
  gap:16px;
}

.panel {
  background:#111827;
  color:white;
  border-radius:12px;
  padding:18px;
}

.live-item {
  background:#1f2937;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
}

table {
  width:100%;
  border-collapse:collapse;
  margin-top:16px;
}

th, td {
  padding:10px;
  border-bottom:1px solid #e5e7eb;
}

.status {
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
  font-weight:700;
}

.status-green { background:#dcfce7; }
.status-yellow { background:#fef3c7; }
.status-red { background:#fee2e2; }

.tier {
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
  font-weight:700;
}

.t1 { background:#dcfce7; }
.t2 { background:#fef3c7; }
.t3 { background:#fee2e2; }

.priority-box {
  border:1px solid #e5e7eb;
  border-radius:12px;
  padding:14px;
  margin-top:12px;
}

button {
  padding:10px 14px;
  margin-right:8px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>CarePath Command Center</h1>

<div>
  <button onclick="goNotifications()">Notification Inbox</button>
</div>

<div id="topAlert"></div>

<div class="command-strip">
  <div class="panel">
    <h2>Live Alerts</h2>
    <div id="liveFeed"></div>
  </div>

  <div class="panel">
    <h2>Command Status</h2>
    <p id="commandMode">Monitoring</p>
    <button onclick="simulateAlert()">Simulate Alert</button>
  </div>
</div>

<div class="card">
<h2>Coordinator Summary</h2>
<div class="grid">
<div class="metric red"><h3>Needs Action</h3><p id="needsAction">0</p></div>
<div class="metric yellow"><h3>Escalated</h3><p id="escalated">0</p></div>
<div class="metric green"><h3>Improving</h3><p id="improving">0</p></div>
<div class="metric blue"><h3>Declining</h3><p id="declining">0</p></div>
</div>
</div>

<div class="card">
<h2>Patients</h2>

<table>
<thead>
<tr>
<th>Name</th>
<th>Status</th>
<th>ERS</th>
<th>Trend</th>
<th>Tier</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

</div>

<script>

let patients = JSON.parse(localStorage.getItem("cp_demo_patients") || "[]");
let alertFeed = JSON.parse(localStorage.getItem("cp_alert_feed") || "[]");

// NAV
function goNotifications(){
  window.location.href = "notifications.html";
}

// CLICK PATIENT
function openPatient(p){
  localStorage.setItem("selected_patient", JSON.stringify(p));
  window.location.href = "patient-detail.html";
}

// ALERT ENGINE
function pushAlerts(){
  patients.forEach(p=>{
    if(p.status==="red" && p.trend==="↓ Declining"){
      alertFeed.unshift({
        level:"red",
        text:`${p.name} deteriorating - ERS ${p.score}`,
        time:new Date().toLocaleTimeString()
      });
    }
  });

  alertFeed = alertFeed.slice(0,6);
  localStorage.setItem("cp_alert_feed", JSON.stringify(alertFeed));
}

// RENDER ALERT
function renderAlerts(){
  let top = alertFeed[0];
  if(!top){
    document.getElementById("topAlert").innerHTML =
    `<div class="alert-banner alert-green">System Stable</div>`;
    return;
  }

  let color = top.level==="red"?"alert-red":"alert-yellow";

  document.getElementById("topAlert").innerHTML =
  `<div class="alert-banner ${color}">${top.text}</div>`;

  let feedHTML="";
  alertFeed.forEach(a=>{
    feedHTML += `<div class="live-item">${a.text}</div>`;
  });

  document.getElementById("liveFeed").innerHTML = feedHTML;
}

// TABLE
function renderTable(){
  let html="";
  patients.forEach(p=>{
    html += `
    <tr onclick='openPatient(${JSON.stringify(p)})' style="cursor:pointer;">
      <td>${p.name}</td>
      <td><span class="status status-${p.status}">${p.status}</span></td>
      <td>${p.score}</td>
      <td>${p.trend}</td>
      <td><span class="tier ${p.tier==="Tier 3"?"t3":p.tier==="Tier 2"?"t2":"t1"}">${p.tier}</span></td>
    </tr>`;
  });
  document.getElementById("table").innerHTML = html;
}

// METRICS
function renderMetrics(){
document.getElementById("needsAction").innerText =
patients.filter(p=>p.tier!=="Tier 1").length;

document.getElementById("improving").innerText =
patients.filter(p=>p.trend.includes("↑")).length;

document.getElementById("declining").innerText =
patients.filter(p=>p.trend.includes("↓")).length;

document.getElementById("escalated").innerText =
patients.filter(p=>p.tier==="Tier 3").length;
}

// SIMULATE
function simulateAlert(){
  alertFeed.unshift({
    level:"red",
    text:"Simulated patient deterioration",
    time:new Date().toLocaleTimeString()
  });
  localStorage.setItem("cp_alert_feed", JSON.stringify(alertFeed));
  renderAlerts();
}

// INIT
pushAlerts();
renderAlerts();
renderTable();
renderMetrics();

</script>

</body>
</html>

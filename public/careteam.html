<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Care Team Dashboard</title>

<style>
body { font-family: Arial; background:#f3f4f6; margin:0; }

.container { max-width:1100px; margin:auto; padding:20px; }

.card {
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

.grid {
  display:grid;
  grid-template-columns: repeat(4,1fr);
  gap:12px;
}

.metric {
  padding:15px;
  border-radius:10px;
  background:#f9fafb;
}

.metric h3 { margin:0; font-size:12px; color:#6b7280; }
.metric p { margin:5px 0 0; font-size:22px; font-weight:bold; }

.red { background:#fee2e2; }
.yellow { background:#fef3c7; }
.green { background:#dcfce7; }
.blue { background:#e0f2fe; }

table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  padding:10px;
  border-bottom:1px solid #e5e7eb;
}

.status {
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
}

.status-green { background:#dcfce7; }
.status-yellow { background:#fef3c7; }
.status-red { background:#fee2e2; }

.alert {
  padding:10px;
  border-radius:8px;
  margin-top:10px;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>Care Team Dashboard</h1>

<!-- COORDINATOR SUMMARY -->
<div class="card">
<h2>Coordinator Summary</h2>
<div class="grid">

<div class="metric red">
<h3>Needs Action</h3>
<p id="needsAction">0</p>
</div>

<div class="metric yellow">
<h3>Escalated Today</h3>
<p id="escalated">0</p>
</div>

<div class="metric green">
<h3>Improving</h3>
<p id="improving">0</p>
</div>

<div class="metric blue">
<h3>Declining</h3>
<p id="declining">0</p>
</div>

</div>
</div>

<!-- PILOT METRICS -->
<div class="card">
<h2>Pilot Metrics</h2>

<div class="grid">

<div class="metric blue">
<h3>Check-ins Today</h3>
<p id="checkins">0</p>
</div>

<div class="metric green">
<h3>Adherence</h3>
<p id="adherence">0%</p>
</div>

<div class="metric">
<h3>Average ERS</h3>
<p id="avg">0</p>
</div>

<div class="metric red">
<h3>High Risk</h3>
<p id="risk">0</p>
</div>

</div>
</div>

<!-- PATIENT TABLE -->
<div class="card">
<h2>Patients</h2>

<table>
<thead>
<tr>
<th>Name</th>
<th>Status</th>
<th>ERS</th>
<th>Trend</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

</div>

<script>

let patients = [
 {name:"Maria", status:"red", score:40, trend:"↓ Declining"},
 {name:"James", status:"yellow", score:70, trend:"↓ Declining"},
 {name:"Linda", status:"green", score:95, trend:"↑ Improving"},
 {name:"Robert", status:"yellow", score:65, trend:"→ Stable"}
];

// ---------- RENDER TABLE ----------
function renderTable(){
 let html="";
 patients.forEach(p=>{
   html += `
   <tr>
   <td>${p.name}</td>
   <td><span class="status status-${p.status}">${p.status}</span></td>
   <td>${p.score}</td>
   <td>${p.trend}</td>
   </tr>
   `;
 });
 document.getElementById("table").innerHTML = html;
}

// ---------- METRICS ----------
function renderMetrics(){

 let needsAction = patients.filter(p=>p.status!=="green").length;
 let improving = patients.filter(p=>p.trend.includes("↑")).length;
 let declining = patients.filter(p=>p.trend.includes("↓")).length;
 let highRisk = patients.filter(p=>p.status==="red").length;

 let avg = Math.round(
   patients.reduce((sum,p)=>sum+p.score,0)/patients.length
 );

 let adherence = Math.round(
   (patients.filter(p=>p.score>=80).length / patients.length)*100
 );

 document.getElementById("needsAction").innerText = needsAction;
 document.getElementById("improving").innerText = improving;
 document.getElementById("declining").innerText = declining;
 document.getElementById("risk").innerText = highRisk;
 document.getElementById("avg").innerText = avg;
 document.getElementById("adherence").innerText = adherence+"%";

}

// ---------- INIT ----------
renderTable();
renderMetrics();

</script>

</body>
</html>

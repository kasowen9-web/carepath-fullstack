<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CarePath Patient Check-In</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="patient-page">
  <main class="patient-shell">
    <section class="patient-card">
      <div class="patient-brand">
        <div class="patient-logo">C</div>
        <div>
          <h1>CarePath</h1>
          <p>Your daily care check-in</p>
        </div>
      </div>

      <div id="patient-loading" class="patient-loading">Loading your check-in…</div>

      <div id="patient-content" style="display: none;">
        <header class="patient-header">
          <h2 id="patient-name">Patient Name</h2>
          <p id="patient-diagnosis">Diagnosis</p>
        </header>

        <div class="patient-panel">
          <h3>Today’s Check-In</h3>
          <p class="patient-subtext">
            Please answer a few quick questions so your care team can stay updated.
          </p>

          <form id="patient-checkin-form" class="patient-form">
            <label>
              Weight today
              <input type="number" id="weight" step="0.1" required />
            </label>

            <div id="medication-questions" class="patient-med-list"></div>

            <label>
              Shortness of breath
              <select id="shortnessOfBreath">
                <option>None</option>
                <option>Mild</option>
                <option>Moderate</option>
                <option>Severe</option>
              </select>
            </label>

            <label>
              Swelling
              <select id="swelling">
                <option>None</option>
                <option>Mild</option>
                <option>Moderate</option>
                <option>Severe</option>
              </select>
            </label>

            <label>
              Dizziness
              <select id="dizziness">
                <option>No</option>
                <option>Yes</option>
              </select>
            </label>

            <label>
              Chest pain
              <select id="chestPain">
                <option>No</option>
                <option>Yes</option>
              </select>
            </label>

            <button type="submit" class="patient-submit">Submit Check-In</button>
          </form>
        </div>

        <div id="patient-success" class="patient-success" style="display: none;">
          <h3>Thank you</h3>
          <p>Your check-in was submitted successfully.</p>
          <p id="patient-success-detail"></p>
        </div>
      </div>

      <div id="patient-error" class="patient-error" style="display: none;"></div>
    </section>
  </main>

  <script>
let currentPatient = null;

function byId(id) {
  return document.getElementById(id);
}

async function getJSON(url) {
  const res = await fetch(url);
  if (!res.ok) {
    throw new Error(`Request failed: ${res.status}`);
  }
  return res.json();
}

async function postJSON(url, body) {
  const res = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });

  if (!res.ok) {
    throw new Error(`Request failed: ${res.status}`);
  }

  return res.json();
}

function renderMedicationQuestions(patient) {
  const container = byId("medication-questions");
  const meds = Array.isArray(patient.criticalMeds) ? patient.criticalMeds : [];

  if (!meds.length) {
    container.innerHTML = `
      <div class="patient-med-card">
        <p>No medications listed for today.</p>
      </div>
    `;
    return;
  }

  container.innerHTML = `
    <div class="patient-med-card">
      <h4>Your medications</h4>
      ${meds.map((med) => `
        <label>
          Did you take ${med} today?
          <select class="med-response" data-med-name="${med}">
            <option>Yes</option>
            <option>No</option>
          </select>
        </label>
      `).join("")}
    </div>
  `;
}

function getPatientIdFromUrl() {
  const params = new URLSearchParams(window.location.search);
  return params.get("patientId");
}

async function loadPatient() {
  try {
    const patients = await getJSON("/api/patients");
    if (!Array.isArray(patients) || !patients.length) {
      throw new Error("No patients found.");
    }

    const requestedPatientId = getPatientIdFromUrl();
    currentPatient =
      patients.find((p) => p.id === requestedPatientId) ||
      patients[0];

    byId("patient-name").textContent = currentPatient.name;
    byId("patient-diagnosis").textContent = currentPatient.diagnosis || "Care plan check-in";

    renderMedicationQuestions(currentPatient);

    byId("patient-loading").style.display = "none";
    byId("patient-content").style.display = "block";
  } catch (error) {
    byId("patient-loading").style.display = "none";
    byId("patient-error").style.display = "block";
    byId("patient-error").textContent = "We could not load your check-in right now.";
    console.error(error);
  }
}

byId("patient-checkin-form").addEventListener("submit", async (e) => {
  e.preventDefault();

  if (!currentPatient) return;

  const medResponses = {};
  document.querySelectorAll(".med-response").forEach((select) => {
    medResponses[select.dataset.medName] = select.value;
  });

  try {
    const response = await postJSON("/api/checkins", {
      patientId: currentPatient.id,
      weight: byId("weight").value,
      medResponses,
      shortnessOfBreath: byId("shortnessOfBreath").value,
      swelling: byId("swelling").value,
      dizziness: byId("dizziness").value,
      chestPain: byId("chestPain").value
    });

    byId("patient-checkin-form").style.display = "none";
    byId("patient-success").style.display = "block";
    byId("patient-success-detail").textContent =
      `Your care team has been updated. Current status: ${response.status.status}.`;
  } catch (error) {
    byId("patient-error").style.display = "block";
    byId("patient-error").textContent = "Your check-in could not be submitted. Please try again.";
    console.error(error);
  }
});

loadPatient();
</script>
</body>
</html>

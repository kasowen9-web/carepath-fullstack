<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CarePath Continuum</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="onboarding-container">

  <div class="onboarding-header">
    <div class="logo-circle">❤️</div>
    <h1 id="step-title">Let’s get you set up</h1>
    <p id="step-subtitle">We’ll use this to support you over the next 30 days</p>
  </div>

  <div class="progress-bar">
    <div class="step active" id="s1">1</div>
    <div class="line"></div>
    <div class="step" id="s2">2</div>
    <div class="line"></div>
    <div class="step" id="s3">3</div>
    <div class="line"></div>
    <div class="step" id="s4">4</div>
    <div class="line"></div>
    <div class="step" id="s5">5</div>
  </div>

  <div class="card" id="form-area"></div>

</div>

<script src="app.js"></script>

</body>
</html>

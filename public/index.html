<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CarePath Prototype</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">C</div>
        <div>
          <h1>CarePath</h1>
          <p>Care execution platform</p>
        </div>
      </div>
      <nav>
        <button class="nav-btn active" data-view="dashboard">Dashboard</button>
        <button class="nav-btn" data-view="patient-checkin">Patient Check-In</button>
        <button class="nav-btn" data-view="enroll-patient">Enroll Patient</button>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <h2 id="view-title">Nurse Dashboard</h2>
        <p id="view-subtitle">Execution visibility after discharge</p>
      </header>

      <section id="dashboard-view" class="view active">
        <div id="summary-cards"></div>
        <div id="task-list"></div>
        <table>
          <tbody id="patient-rows"></tbody>
        </table>
        <div id="patient-detail-panel" style="display:none;">
          <div id="patient-detail-content"></div>
        </div>
      </section>

      <section id="checkin-view" class="view">
        <form id="checkin-form">
          <select id="patientId"></select>
          <div id="medication-questions"></div>
          <input id="weight" />
          <select id="shortnessOfBreath"></select>
          <select id="swelling"></select>
          <select id="dizziness"></select>
          <select id="chestPain"></select>
          <button type="submit">Submit</button>
          <div id="checkin-result"></div>
        </form>
      </section>

      <section id="enroll-view" class="view">
        <form id="enroll-form">
          <input id="enrollName" />
          <input id="enrollPhone" />
          <input id="enrollDiagnosis" />
          <input id="enrollDischargeDate" />
          <input id="enrollBaselineWeight" />
          <input id="enrollCriticalMeds" />
          <input id="enrollAssignedNurse" />
          <input id="enrollProvider" />
          <button type="submit">Save</button>
          <div id="enroll-result"></div>
        </form>
      </section>
    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>

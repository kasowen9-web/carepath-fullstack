<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CarePath Continuum</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="onboarding-container">

  <div class="onboarding-header">
    <div class="logo-circle">❤️</div>
    <h1>Welcome to CarePath Continuum</h1>
    <p>Let's set up your profile so your care team can support you best</p>
  </div>

  <div class="progress-bar">
    <div class="step active">1</div>
    <div class="line"></div>
    <div class="step">2</div>
    <div class="line"></div>
    <div class="step">3</div>
    <div class="line"></div>
    <div class="step">4</div>
    <div class="line"></div>
    <div class="step">5</div>
  </div>

  <div class="card">
    <h2>Contact Details</h2>
    <p>Please confirm your contact information so your care team can reach you when needed.</p>

    <input type="text" placeholder="Enter your full name">
    <input type="text" placeholder="(555) 123-4567">

    <button>Continue</button>
  </div>

</div>

</body>
</html>

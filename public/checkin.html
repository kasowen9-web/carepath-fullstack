<script>
function submitCheckIn() {

  const weight = document.getElementById("weight").value;
  const meds = document.getElementById("meds").value;

  let score = 100;

  if (meds === "no") score -= 30;
  if (weight && Number(weight) > 200) score -= 30;

  let status = "green";
  if (score < 80) status = "yellow";
  if (score < 50) status = "red";

  localStorage.setItem("carepath_score", score);
  localStorage.setItem("carepath_status", status);
  localStorage.setItem("carepath_weight", weight);
  localStorage.setItem("carepath_meds", meds);

  window.location.href = "patient.html";
}
</script>

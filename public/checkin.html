<script>
function submitCheckIn() {

  const weight = document.getElementById("weightToday").value;
  const meds = document.getElementById("medsToday")?.value || "";

  let score = 100;

  if (meds === "No") score -= 30;
  if (weight && Number(weight) > 200) score -= 20;

  let status = "green";
  if (score < 80) status = "yellow";
  if (score < 50) status = "red";

  // 🔥 SAVE TREND HISTORY
  let history = JSON.parse(localStorage.getItem("cp_score_history") || "[]");

  history.push({
    score: score,
    time: new Date().toISOString()
  });

  localStorage.setItem("cp_score_history", JSON.stringify(history));

  // existing save
  localStorage.setItem("carepath_score", score);
  localStorage.setItem("carepath_status", status);

  window.location.href = "patient.html";
}
</script>
